services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stylenest
      POSTGRES_USER: stylenest
      POSTGRES_PASSWORD: stylenest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylenest -d stylenest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://stylenest:stylenest@db:5432/stylenest
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      DJANGO_SECURE_SSL_REDIRECT: "False"
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
